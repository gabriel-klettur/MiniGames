<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="squadro-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#DC2626;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B91C1C;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="6" fill="url(#squadro-gradient)"/>
  <g fill="white">
    <!-- Race track -->
    <rect x="2" y="2" width="28" height="28" rx="4" fill="none" stroke="white" stroke-width="2"/>
    <rect x="6" y="6" width="20" height="20" rx="2" fill="none" stroke="white" stroke-width="1"/>
    
    <!-- Checkered pattern -->
    <rect x="8" y="8" width="2" height="2" fill="white"/>
    <rect x="12" y="8" width="2" height="2" fill="black"/>
    <rect x="16" y="8" width="2" height="2" fill="white"/>
    <rect x="20" y="8" width="2" height="2" fill="black"/>
    
    <rect x="8" y="12" width="2" height="2" fill="black"/>
    <rect x="12" y="12" width="2" height="2" fill="white"/>
    <rect x="16" y="12" width="2" height="2" fill="black"/>
    <rect x="20" y="12" width="2" height="2" fill="white"/>
    
    <rect x="8" y="16" width="2" height="2" fill="white"/>
    <rect x="12" y="16" width="2" height="2" fill="black"/>
    <rect x="16" y="16" width="2" height="2" fill="white"/>
    <rect x="20" y="16" width="2" height="2" fill="black"/>
    
    <rect x="8" y="20" width="2" height="2" fill="black"/>
    <rect x="12" y="20" width="2" height="2" fill="white"/>
    <rect x="16" y="20" width="2" height="2" fill="black"/>
    <rect x="20" y="20" width="2" height="2" fill="white"/>
    
    <!-- Racing pieces -->
    <circle cx="4" cy="16" r="1.5" fill="#FCD34D"/>
    <circle cx="28" cy="16" r="1.5" fill="#60A5FA"/>
    <circle cx="16" cy="4" r="1.5" fill="#F87171"/>
    <circle cx="16" cy="28" r="1.5" fill="#A78BFA"/>
  </g>
</svg>
