<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="ai-quiz-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366F1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="brain-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FCD34D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F59E0B;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="6" fill="url(#ai-quiz-gradient)"/>
  <g fill="white">
    <!-- Brain/AI shape -->
    <path d="M 8 12 Q 8 8, 12 8 Q 14 6, 16 8 Q 20 8, 20 12 Q 24 12, 24 16 Q 24 20, 20 20 Q 20 24, 16 24 Q 14 26, 12 24 Q 8 24, 8 20 Q 4 20, 4 16 Q 4 12, 8 12" fill="url(#brain-gradient)"/>
    
    <!-- Neural connections -->
    <circle cx="10" cy="12" r="1" fill="#4C1D95"/>
    <circle cx="14" cy="10" r="1" fill="#4C1D95"/>
    <circle cx="18" cy="12" r="1" fill="#4C1D95"/>
    <circle cx="10" cy="20" r="1" fill="#4C1D95"/>
    <circle cx="14" cy="22" r="1" fill="#4C1D95"/>
    <circle cx="18" cy="20" r="1" fill="#4C1D95"/>
    <circle cx="12" cy="16" r="1" fill="#4C1D95"/>
    <circle cx="16" cy="16" r="1" fill="#4C1D95"/>
    
    <!-- Connection lines -->
    <line x1="10" y1="12" x2="12" y2="16" stroke="#4C1D95" stroke-width="0.5"/>
    <line x1="14" y1="10" x2="12" y2="16" stroke="#4C1D95" stroke-width="0.5"/>
    <line x1="18" y1="12" x2="16" y2="16" stroke="#4C1D95" stroke-width="0.5"/>
    <line x1="10" y1="20" x2="12" y2="16" stroke="#4C1D95" stroke-width="0.5"/>
    <line x1="14" y1="22" x2="16" y2="16" stroke="#4C1D95" stroke-width="0.5"/>
    <line x1="18" y1="20" x2="16" y2="16" stroke="#4C1D95" stroke-width="0.5"/>
    <line x1="12" y1="16" x2="16" y2="16" stroke="#4C1D95" stroke-width="0.5"/>
    
    <!-- Question mark -->
    <text x="26" y="26" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#E0E7FF">?</text>
  </g>
</svg>
